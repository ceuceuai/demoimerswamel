<!DOCTYPE html>
<html lang="id">
<head>
  <!-- 
    =========================================================================
    iMersWamel Pro - Professional Lead Capture Frontend
    Version     : 1.0 (The Final Clean )
    Created by  : Terry Katar | iMersnesia.com
    Product     : Reseller Right iMersWAMEL | iMersFireship Ecosystem
    =========================================================================
    * DESKRIPSI TEKNIS:
      File ini merupakan gerbang utama (entry point) pendaftaran leads yang 
      terintegrasi secara asinkron dengan Google Apps Script. Menggunakan 
      teknologi Tailwind CSS untuk sistem grid responsif dan Vanilla JS 
      untuk performa tinggi tanpa dependensi eksternal yang berat.      

    * PERHATIAN: 
      Dilarang keras merampingkan kode ini demi efisiensi tanpa izin tertulis.
      Struktur dibuat Sudah Teruji dan Melewati Test Tahap Akhir.
    =========================================================================
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iMersWamel | WA & Email Funnel Marketing</title>
  
  <!-- 
    ASSETS EKSTERNAL:
    - Tailwind CSS: Framework utama untuk utilitas visual dashboard.
    - Google Fonts: Koleksi font profesional untuk Typography Engine.
    - Lucide Icons: Set ikon minimalis yang elegan.
  -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Courier+Prime&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- PUSAT INJEKSI CSS DINAMIS (TYPOGRAPHY ENGINE LOGIC) -->
  <style id="dynamic-typography">
    /**
     * Placeholder untuk elemen judul utama (dynamicAppName). 
     * Area ini akan ditimpa secara real-time oleh JavaScript 
     * berdasarkan konfigurasi yang Anda simpan di Dashboard Admin.
     */
    #dynamicAppName { 
      font-size: 42px; 
      font-family: 'Poppins', sans-serif; 
      color: #ffffff; 
      text-transform: none !important;
    }
  </style>

  <style>
    /** * =========================================================================
     * 1. CORE LAYOUT ENGINE (Base Architecture)
     * Mengatur pondasi utama agar tampilan stabil di berbagai perangkat.
     * =========================================================================
     */
    body { 
      font-family: 'Poppins', sans-serif;
      min-height: 100vh; 
      min-height: -webkit-fill-available;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      /* justify-content: flex-start memberikan ruang scroll natural pada layar HP */
      justify-content: flex-start; 
      padding: 60px 20px; 
      opacity: 0; /* Transisi lembut saat inisialisasi cloud selesai */
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.6s ease;
      overflow-x: hidden;
      overflow-y: auto;
      text-transform: none !important; /* GLOBAL NO UPPERCASE */
    }

    /* Fix untuk masalah tinggi layar pada browser Safari Mobile */
    html { height: -webkit-fill-available; }

    /** * =========================================================================
     * 2. THEME ENGINE (Visual Atmosphere)
     * Menggunakan warna solid untuk memaksimalkan efek Glassmorphism.
     * =========================================================================
     */
    
    /* THEME: MIDNIGHT (Deep Indigo Solid - Premium Dark) */
    .theme-midnight { 
      background-color: #0f172a; 
      color: white; 
    }
    .theme-midnight .glass { 
      background: rgba(255, 255, 255, 0.05); 
      border: 1px solid rgba(255, 255, 255, 0.12); 
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }
    .theme-midnight .input-control { 
      background: rgba(30, 41, 59, 0.85); 
      color: white; 
      border: 1px solid rgba(255, 255, 255, 0.08); 
    }
    .theme-midnight h1 { color: #ffffff; }

    /* THEME: CLEAN (Soft Off-White Solid - Modern Light) */
    .theme-clean { 
      background-color: #f8fafc; 
      color: #0f172a; 
    }
    .theme-clean .glass { 
      background: rgba(255, 255, 255, 0.85); 
      border: 1px solid #e2e8f0; 
      box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.05); 
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }
    .theme-clean .input-control { 
      background: #ffffff; 
      color: #0f172a; 
      border: 1px solid #cbd5e1; 
    }
    .theme-clean h1 { color: #1e1b4b; }
    .theme-clean label { color: #475569; font-weight: 700; }

    /* THEME: NATURE (Deep Forest Green Solid - Professional Nature) */
    .theme-nature { 
      background-color: #022c22; 
      color: white; 
    }
    .theme-nature .glass { 
      background: rgba(255, 255, 255, 0.04); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
    }
    .theme-nature .input-control { 
      background: rgba(6, 78, 59, 0.5); 
      color: white; 
      border: 1px solid rgba(255, 255, 255, 0.08); 
    }

    /** * =========================================================================
     * 3. RESPONSIVE LAYOUT SYSTEM
     * Mengatur transisi layout antara Center dan Split secara adaptif.
     * =========================================================================
     */
    #mainWrapper { 
      width: 100%; 
      display: flex; 
      flex-direction: column; 
      transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 100%;
      margin-top: 2rem;
    }

    /* Layout mode CENTER: Terpusat untuk fokus tinggi pendaftaran */
    .layout-center { align-items: center; text-align: center; }
    .layout-center #contentSide { margin-bottom: 2.5rem; width: 100%; max-width: 650px; }
    .layout-center .glass { max-width: 460px; width: 100%; margin: 0 auto; }

    /* Layout mode SPLIT: Gambar produk di samping form input (Desktop Only) */
    .layout-split { align-items: center; gap: 30px; max-width: 1150px; width: 100%; margin: 0 auto; }
    
    @media (min-width: 768px) { 
      .layout-split { flex-direction: row; justify-content: space-between; text-align: left; gap: 60px; }
      .layout-split #contentSide { width: 55%; text-align: left; }
      .layout-split #contentSide img { margin-left: 0; margin-right: auto; }
      .layout-split #formSide { width: 440px; flex-shrink: 0; }
    }

    /** * =========================================================================
     * 4. UI COMPONENTS (Glassmorphism, Inputs, Buttons)
     * Detail visual untuk pengalaman pengguna yang tacttile dan premium.
     * =========================================================================
     */
    .glass { 
      border-radius: 1.8rem; 
      padding: 2.25rem; 
      position: relative;
      z-index: 10;
    }

    @media (min-width: 640px) { .glass { padding: 3rem; border-radius: 2.5rem; } }

    /* Input Styling - Ramping, Kalem & Mixed Case Logic */
    .input-control { 
      width: 100%; 
      padding: 0.9rem 1.35rem; 
      border-radius: 0.85rem; 
      margin-top: 0.5rem; 
      outline: none; 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      font-size: 16px; 
      font-weight: 500;
      text-transform: none !important;
    }
    
    .input-control:focus { 
      border-color: #6366f1; 
      box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.15); 
    }

    /* CTA Button - Elegant Indigo Soft Gradient (Strict No Uppercase) */
    /* FIXED: Padding vertikal ditingkatkan (py-6) agar tombol lebih tinggi dan tidak rapet */
    .btn-cta { 
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); 
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
      cursor: pointer; 
      font-weight: 700; 
      color: white;
      letter-spacing: 0.01em;
      text-transform: none !important;
      padding-top: 1.5rem; /* Setara py-6 */
      padding-bottom: 1.5rem; /* Setara py-6 */
    }
    
    .btn-cta:hover { 
      transform: translateY(-3px); 
      filter: brightness(1.05); 
      box-shadow: 0 18px 40px -8px rgba(99, 102, 241, 0.5); 
    }
    
    .btn-cta:active { transform: scale(0.97); }

    /** * =========================================================================
     * 5. DYNAMIC & PROTECTED FOOTER (Absolute Centered)
     * Mengatur footer agar tampil ramping dan tepat di tengah layar bawah.
     * =========================================================================
     */
    #protectedFooter {
      margin-top: 5rem; 
      padding-bottom: 3.5rem;
      text-align: center;
      width: 100%;
      z-index: 5;
    }

    /* Brand Copyright Area */
    .brand-copyright {
      @apply mb-3 block;
      opacity: 0.45;
      font-weight: 600;
      text-transform: none !important;
      letter-spacing: 0.05em;
      font-size: 11px;
      color: #64748b;
    }

    .brand-copyright a {
      @apply transition-all duration-300;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .brand-copyright a:hover { opacity: 1; color: #6366f1; }

    /* Overlay Loader Styles */
    #loader-overlay { 
      position: fixed; inset: 0; background: #0f172a; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      z-index: 9999; transition: opacity 0.7s ease; 
    }
    
    /* Animation Keyframes Engine */
    @keyframes fadeInSlide { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeInSlide 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    
    @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-pop { animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
  </style>
</head>
<body class="theme-midnight">

  <!-- =========================================================================
       LAYER 1: SPLASH LOADER (The Cloud Handshake)
       Mencegah 'Flicker UI' saat sinkronisasi database fisik sedang berjalan.
       ========================================================================= -->
  <div id="loader-overlay">
    <div class="flex flex-col items-center gap-6 text-center px-8">
      <!-- Ikon Spinner Elegan -->
      <div id="loader-spinner" class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin shadow-2xl"></div>
      <div class="space-y-2">
        <p id="loader-text" class="text-[11px] font-black text-indigo-400 uppercase tracking-[0.4em] animate-pulse">Menghubungkan iMersWamel...</p>
        <p class="text-[8px] text-slate-700 font-bold uppercase tracking-widest">Precision Typography Engine v6.1.0</p>
      </div>
    </div>
  </div>

  <!-- =========================================================================
       LAYER 2: MAIN CONTENT (DYNAMIC ENGINE)
       Struktur layout yang dikendalikan sepenuhnya oleh Backend Google Sheets.
       ========================================================================= -->
  <div id="mainWrapper" class="layout-center animate-in">
    
    <!-- SUB-LAYER A: BRANDING & MESSAGING AREA -->
    <div id="contentSide" class="z-20 px-6 md:px-0">
      <!-- Lokasi Logo Dinamis dari Cloud -->
      <div id="logoWrapper" class="hidden mb-6 md:mb-10">
        <img id="dynamicLogo" src="" alt="Brand Logo" class="h-14 md:h-22 w-auto mx-auto object-contain drop-shadow-2xl">
      </div>
      
      <!-- NAMA BRAND UTAMA (Target Utama Injeksi Typography Engine) -->
      <h1 id="dynamicAppName" class="font-black tracking-tighter uppercase mb-4 leading-tight">
        <!-- Text ditarik otomatis dari Cloud via JavaScript initializeApplication() -->
      </h1>
      
      <!-- Tagline Promosi Kalem & Elegan dari Dashboard -->
      <p id="dynamicTagline" class="text-sm md:text-lg font-medium opacity-80 leading-relaxed mx-auto max-w-md md:max-w-xl mb-4">
        <!-- Text ditarik otomatis dari Cloud via JavaScript -->
      </p>
      
      <!-- IMAGE SHOWCASE: Muncul jika Layout Split & Toggle ON di Admin -->
      <div id="productImageWrapper" class="hidden mt-8 transform transition-all duration-1000 scale-95 opacity-0">
        <img id="productImage" src="" alt="Showcase" class="w-full rounded-xl md:rounded-[2rem] shadow-2xl border border-white/5 ring-1 ring-white/5">
      </div>
    </div>

    <!-- SUB-LAYER B: INTERACTION FORM (Glassmorphism Guard) -->
    <div id="formSide" class="w-full flex justify-center z-20 mt-6 md:mt-0 px-4">
      <main class="glass w-full">
        
        <!-- INITIAL STATE: USER INPUT FORM -->
        <div id="formWrapper" class="transition-all duration-800">
          <div class="text-center mb-8 md:mb-10">
            <!-- Heading Form Dinamis (Misal: Daftar Sekarang) -->
            <h2 id="dynamicFormHeading" class="text-lg md:text-xl font-bold tracking-wider"></h2>
            <!-- Dekorator Ramping iMersWamel Signature -->
            <div class="w-12 h-1 bg-indigo-500 mx-auto mt-4 rounded-full opacity-60 shadow-lg shadow-indigo-500/50"></div>
          </div>

          <!-- FORM START: Sinkronisasi Fisik ke Spreadsheet Tab 'Leads' -->
          <form id="leadForm" onsubmit="handleSubmit(event)" class="space-y-5 md:space-y-6 text-left">
            <input type="hidden" id="campaignInput" name="campaign" value="GENERAL">
            
            <!-- Input: NAMA LENGKAP -->
            <div class="group">
              <label class="text-[10px] font-bold opacity-60 ml-1 tracking-wide group-focus-within:text-indigo-400 transition-all duration-300">Nama Lengkap</label>
              <input type="text" name="nama" id="nama" required placeholder="Tulis nama lengkap Anda" class="input-control">
            </div>

            <!-- Input: ALAMAT EMAIL -->
            <div class="group">
              <label class="text-[10px] font-bold opacity-60 ml-1 tracking-wide group-focus-within:text-indigo-400 transition-all duration-300">Alamat Email Aktif</label>
              <input type="email" name="email" id="email" required placeholder="nama@email.com" class="input-control">
            </div>

            <!-- Input: NOMOR WHATSAPP (Standarisasi Internasional) -->
            <div class="group">
              <label class="text-[10px] font-bold opacity-60 ml-1 tracking-wide group-focus-within:text-indigo-400 transition-all duration-300">Nomor WhatsApp</label>
              <input type="tel" name="wa" id="wa" required placeholder="08xxxxxxxxxx" class="input-control">
            </div>

            <!-- ACTION BUTTON: DINAMIS & TALL (v6.1.0) -->
            <!-- FIXED: Button dibuat lebih tinggi (padding py-6 setara h-20/24) -->
            <button type="submit" id="submitBtn" class="btn-cta w-full rounded-2xl text-[18px] md:text-[20px] mt-4 shadow-lg active:scale-95">
               <!-- Text ditarik otomatis dari Cloud via JavaScript -->
            </button>
            
            <!-- Security Factor Badge -->
            <div class="flex items-center justify-center gap-3 mt-8 opacity-25 select-none pointer-events-none">
              <i data-lucide="shield-check" class="w-3.5 h-3.5 text-indigo-500"></i>
              <p class="text-[9px] font-bold tracking-widest">Lead Secure Protection Active</p>
            </div>
          </form>
        </div>

        <!-- STATE 2: SUCCESS FEEDBACK (After Cloud Handshake) -->
        <div id="successState" class="hidden text-center py-12 md:py-16 success-pop px-4">
          <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-emerald-500/20 shadow-2xl">
            <i data-lucide="check-circle" class="w-10 h-10 text-emerald-400"></i>
          </div>
          <h2 class="text-3xl md:text-4xl font-black mb-4 uppercase tracking-tighter">Berhasil!</h2>
          <p class="opacity-80 text-sm md:text-lg leading-relaxed mb-10 font-medium">Data pendaftaran Anda telah diamankan. Silakan cek pesan WhatsApp kami segera.</p>
          
          <!-- Redirect Visual Animation -->
          <div class="inline-flex items-center gap-4 px-8 py-3 bg-white/5 rounded-full border border-white/10">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
            <p class="text-[9px] font-bold uppercase tracking-[0.3em]">Mengalihkan Halaman...</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- LAYER 3: DYNAMIC BRAND FOOTER (CENTERED ENGINE) -->
  <footer id="protectedFooter">
    <!-- Copyright Dinamis sesuai input user di Dashboard iMersWamel -->
    <!-- FIXED: Signature Terry Katar dihapus total sesuai instruksi bos -->
    <p class="brand-copyright">
      &copy; 2026 <a id="footerBrandLink" href="#" target="_blank"><span id="footerBrandName">iMersWamel Pro</span></a>. All Rights Reserved.
    </p>
  </footer>

  <!-- 
    =========================================================================
    CORE JAVASCRIPT ENGINE (v6.1.0)
    Logika utama sinkronisasi Typography Engine dan Lead Capture Processor.
    WASIAT: Menggunakan logging detail dan proteksi sinkronisasi fisik database.
    =========================================================================
  -->
  <script>
    /**
     * 1. CONFIGURATION & IDENTITY DETECTION
     * Mendeteksi identitas link melalui parameter URL (?campaign=) atau Path Vercel.
     */
    // URL Backend Google Apps Script (WASIAT: Dilarang Ganti Ini)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyxLmq_IeePVWIQn-ULt8pGZBj9cBEVZE1PGBzYfrzkgavgl01-a0iUUD-wZmJoJqZ51g/exec"; 
    
    // Engine pendeteksi Campaign Slug
    const getCampaignIdentity = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const queryId = urlParams.get('campaign');
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const pathId = pathSegments.pop();
      return queryId || pathId || "GENERAL";
    };

    const campaignId = getCampaignIdentity();
    let currentSettings = {}; 

    /**
     * 2. INITIALIZATION ENGINE (The Ultimate Cloud Sync)
     * Menangani penarikan data visual dari database fisik Google Sheets ke Browser.
     * Memicu injeksi Typography Engine sebelum elemen dirender ke layar user.
     */
    async function initializeApplication() {
      console.log(`iMersWamel: Memulai sinkronisasi cloud [Version 6.1.0] untuk campaign [${campaignId}]...`);
      
      const loaderText = document.getElementById('loader-text');

      try {
        // Melakukan request GET ke Backend API iMersWamel dengan cache-busting timestamp
        const syncUrl = `${WEB_APP_URL}?action=getSettings&campaign=${campaignId}&_t=${Date.now()}`;
        const response = await fetch(syncUrl, { method: 'GET', mode: 'cors' });

        if (!response.ok) throw new Error("Handshake Cloud Gagal.");

        const data = await response.json();
        currentSettings = data;
        
        console.log("iMersWamel Sync Result (v6.1.0):", data);

        // --- RENDER VISUAL: SOLID THEME ENGINE ---
        // Menjamin background tidak belang (1 warna solid) sesuai instruksi Terry Katar.
        document.body.className = `theme-${data.theme || 'midnight'}`;

        // --- TYPOGRAPHY ENGINE INJECTION (CRITICAL v6.1.0) ---
        // Logika suntikan CSS kustom berdasarkan input Dashboard Admin iMersWamel.
        const styleTag = document.getElementById('dynamic-typography');
        
        // Penentuan Font Family Dinamis berdasarkan pilihan Admin
        let fontFamily = 'Poppins, sans-serif';
        if (data.titleFontFamily === 'serif') fontFamily = 'Lora, serif';
        if (data.titleFontFamily === 'monospace') fontFamily = 'Courier Prime, monospace';
        if (data.titleFontFamily === 'Plus Jakarta Sans') fontFamily = 'Plus Jakarta Sans, sans-serif';

        // Penentuan Ukuran Font (Size) - Dilengkapi Responsive Scaler Proposional
        let fontSize = parseInt(data.titleFontSize) || 42;

        // Penentuan Gaya Warna (Solid vs Gradient) sesuai pilihan admin di Dashboard
        let colorStyle = "";
        if (data.titleColorType === 'gradient') {
          // Logika Injeksi Gradient Text (CSS Background-Clip strategy)
          colorStyle = `
            background: linear-gradient(to right, ${data.titleGradientStart || '#6366f1'}, ${data.titleGradientEnd || '#a855f7'}); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
            color: transparent;
          `;
        } else {
          // Logika Injeksi Solid Color (Fallback to Master/Global)
          colorStyle = `color: ${data.titleColorSolid || '#ffffff'}; background: none; -webkit-text-fill-color: initial;`;
        }

        // EKSEKUSI INJEKSI CSS KE DOM (HEAD)
        // Mencegah tampilan 'Gajah' di layar HP dengan responsive limiter.
        styleTag.innerHTML = `
          #dynamicAppName { 
            font-size: ${fontSize}px; 
            font-family: ${fontFamily}; 
            ${colorStyle} 
          }
          /* Responsive Scaler: Otomatis mengecil di layar HP (max 640px) */
          @media (max-width: 640px) {
            #dynamicAppName { font-size: ${Math.max(26, fontSize * 0.7)}px !important; }
          }
        `;

        // --- RENDER LAYOUT ENGINE (CENTER VS SPLIT) ---
        const mainWrapper = document.getElementById('mainWrapper');
        if (data.layout === 'split') {
          mainWrapper.className = "layout-split animate-in";
          
          // Logika Gambar Produk Showcase (Memprioritaskan level Campaign, fallback ke Master)
          const imgUrl = data.productImageUrl || data.masterProductImageUrl;
          const showImg = (data.showProductImg === "true" || data.showProductImg === true) || 
                         (data.masterShowProductImg === "true" || data.masterShowProductImg === true);

          if (showImg && imgUrl) {
            const pImg = document.getElementById('productImage');
            const pWrap = document.getElementById('productImageWrapper');
            pImg.src = imgUrl;
            pWrap.classList.remove('hidden');
            // Delay halus untuk entrance visual produk yang mewah
            setTimeout(() => pWrap.classList.add('scale-100', 'opacity-100'), 250);
          }
        } else {
          mainWrapper.className = "layout-center animate-in";
        }

        // --- RENDER BRANDING & CONTENT DATA ---
        document.title = data.appName || "iMersWamel Pro";
        document.getElementById('dynamicAppName').innerText = data.appName || "iMersWamel";
        document.getElementById('dynamicTagline').innerText = data.tagline || "Solusi Marketing Funnel Modern";
        document.getElementById('dynamicFormHeading').innerText = data.formHeading || "Daftar Sekarang";
        document.getElementById('submitBtn').innerText = data.btnText || "Dapatkan Akses";
        
        // Memasukkan Campaign ID ke dalam payload form pendaftar
        document.getElementById('campaignInput').value = campaignId;

        // --- DYNAMIC FOOTER SYNC ---
        if (data.appName) {
          document.getElementById('footerBrandName').innerText = data.appName;
          document.getElementById('footerBrandLink').href = data.websiteUrl || "#";
        }

        // --- DYNAMIC LOGO RENDER (IDENTITY SINK) ---
        if (data.logoUrl) {
          const lImg = document.getElementById('dynamicLogo');
          lImg.src = data.logoUrl;
          document.getElementById('logoWrapper').classList.remove('hidden');
        }

        // --- TAHAP AKHIR: PELEPASAN SPLASH SCREEN ---
        // Memberikan jeda visual agar Admin merasa proses sinkronisasi telah matang.
        document.getElementById('loader-overlay').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('loader-overlay').remove();
          document.body.style.opacity = '1';
          lucide.createIcons(); // Aktivasi Ikon setelah elemen DOM bersih
        }, 800);

      } catch (err) {
        console.error("iMersWamel Handshake Fail Error Log:", err);
        loaderText.innerHTML = `<p class="text-rose-500 font-bold uppercase tracking-widest">Handshake Cloud iMersWamel Gagal.</p>`;
      }
    }

    /**
     * 3. SUBMISSION ENGINE (POST DATA TO CLOUD)
     * Mengirim data pendaftar (Leads) ke Google Sheets API secara fisik.
     * Menangani visual feedback (loading) agar user tidak bingung.
     */
    async function handleSubmit(event) {
      event.preventDefault();
      const btn = document.getElementById('submitBtn');
      const originalText = btn.innerText;
      
      // Visual Feedback: Loading State Aktif
      btn.innerText = "⏳ SEDANG MENGHUBUNGKAN..."; 
      btn.disabled = true;

      // Ekstraksi data form ke format JSON payload pendaftaran
      const payload = Object.fromEntries(new FormData(event.target).entries());
      console.log("iMersWamel Processor: Mengirim data leads ke cloud...", payload);

      try {
        /**
         * EKSEKUSI TRANSMISI DATA:
         * Menggunakan metode Fetch API POST ke Google Apps Script.
         * Menggunakan mode No-Cors untuk menghindari isu preflight pada endpoint GAS.
         */
        await fetch(WEB_APP_URL, { 
          method: 'POST', 
          mode: 'no-cors', 
          body: JSON.stringify(payload) 
        });
        
        // --- TRANSISI KE TAMPILAN SUKSES ---
        document.getElementById('formWrapper').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('formWrapper').classList.add('hidden');
          document.getElementById('successState').classList.remove('hidden');
          lucide.createIcons(); // Refresh ikon ceklis
        }, 400);
        
        // --- LOGIKA REDIRECT OTOMATIS (DELAY 4.5 DETIK) ---
        // Memberikan waktu leads untuk membaca pesan konfirmasi.
        if (currentSettings.redirectUrl) {
          console.log(`iMersWamel: Redirecting leads to target -> ${currentSettings.redirectUrl}`);
          setTimeout(() => { window.location.href = currentSettings.redirectUrl; }, 4500);
        }

      } catch (e) {
        // Penanganan jika koneksi internet user terputus saat submit
        console.error("iMersWamel Submission Fail Log:", e);
        btn.disabled = false;
        btn.innerText = "COBA LAGI";
        alert("Maaf bos, gangguan koneksi sesaat. Silakan coba klik tombol kirim pendaftaran lagi.");
      }
    }

    /**
     * 4. BOOTSTRAP SYSTEM
     * Memulai pemuatan segera setelah seluruh elemen dokumen (DOM) siap.
     */
    document.addEventListener('DOMContentLoaded', () => {
      initializeApplication();
    });
  </script>
</body>
