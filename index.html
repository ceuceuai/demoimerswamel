<!DOCTYPE html>
<html lang="id">
<head>
  <!-- iMersWAMEL versi 1.0 - Terry Katar | imersnesia.com -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>iMersWamel | Professional Lead Capture</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Courier+Prime&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style id="dynamic-typography">
    #dynamicAppName { font-size: 38px; font-family: 'Poppins', sans-serif; color: #ffffff; text-align: center !important; }
  </style>

  <style>
    body { font-family: 'Plus Jakarta Sans', 'Poppins', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 50px 16px; opacity: 0; transition: opacity 0.8s ease; overflow-x: hidden; text-transform: none !important; }
    .theme-midnight { background-color: #0f172a; color: white; }
    .theme-midnight .glass { background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.05); shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5); }
    .theme-midnight .input-control { background: #0f172a; color: white; border: 1px solid rgba(255, 255, 255, 0.1); }
    .theme-clean { background-color: #f8fafc; color: #0f172a; }
    .theme-clean .glass { background: white; border: 1px solid #e2e8f0; shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
    .theme-clean .input-control { background: #f1f5f9; color: #0f172a; border: 1px solid #e2e8f0; }
    #mainWrapper { width: 100%; display: flex; flex-direction: column; transition: 0.7s ease; max-width: 100%; margin-top: 1rem; }
    .layout-center { align-items: center; text-align: center; }
    @media (min-width: 768px) {
      .layout-split { flex-direction: row !important; justify-content: center !important; align-items: center !important; gap: 60px !important; max-width: 1100px !important; margin: 4rem auto !important; }
      .layout-split #contentSide { width: 50% !important; text-align: center !important; display: flex !important; flex-direction: column !important; align-items: center !important; }
      .layout-split #formSide { width: 400px !important; flex-shrink: 0 !important; }
    }
    .glass { border-radius: 1.8rem; padding: 2.25rem; position: relative; z-index: 10; }
    .input-control { width: 100%; padding: 0.9rem 1.2rem; border-radius: 0.8rem; margin-top: 0.4rem; outline: none; transition: 0.3s ease; font-size: 15px; font-weight: 500; }
    .btn-cta { transition: 0.5s; cursor: pointer; font-weight: 800; color: white; padding: 1.4rem !important; display: block; width: 100%; text-align: center; border-radius: 1rem; border: none; }
    #loader-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-pop { animation: popIn 0.7s forwards; }
  </style>
</head>
<body class="theme-midnight">

  <div id="loader-overlay">
    <div class="flex flex-col items-center gap-6">
      <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
      <p id="loader-text" class="text-[11px] font-black text-indigo-400 uppercase tracking-[0.4em] animate-pulse">Just a moment...</p>
    </div>
  </div>

  <div id="mainWrapper" class="layout-center">
    <div id="contentSide" class="z-20 px-4">
      <div id="logoWrapper" class="hidden mb-10">
        <img id="dynamicLogo" src="" class="h-16 w-auto mx-auto object-contain">
      </div>
      <h1 id="dynamicAppName" class="font-black tracking-tighter mb-3 leading-tight"></h1>
      <p id="dynamicTagline" class="text-[15px] md:text-lg font-medium opacity-80 mx-auto max-w-xl mb-4"></p>
      <div id="productImageWrapper" class="hidden overflow-hidden rounded-3xl shadow-2xl mt-8">
        <img id="productImage" src="" class="mx-auto object-cover w-full h-full">
      </div>
    </div>

    <div id="formSide" class="w-full flex justify-center z-20 mt-8 px-4">
      <main class="glass w-full max-w-[440px]">
        <div id="formWrapper">
          <div class="text-center mb-10">
            <h2 id="dynamicFormHeading" class="text-xl font-bold tracking-wider"></h2>
            <div class="w-10 h-1 bg-indigo-500 mx-auto mt-4 rounded-full opacity-60"></div>
          </div>
          <form id="leadForm" onsubmit="handleSubmit(event)" class="space-y-5">
            <input type="hidden" id="campaignInput" name="campaign" value="GENERAL">
            <div><label class="text-[10px] font-bold opacity-60 ml-1">Nama Lengkap</label><input type="text" name="nama" required placeholder="Tulis nama" class="input-control"></div>
            <div><label class="text-[10px] font-bold opacity-60 ml-1">Alamat Email</label><input type="email" name="email" required placeholder="email@anda.com" class="input-control"></div>
            <div><label class="text-[10px] font-bold opacity-60 ml-1">WhatsApp</label><input type="tel" name="wa" required placeholder="628xxxx" class="input-control"></div>
            <button type="submit" id="submitBtn" class="btn-cta text-[18px] mt-6 active:scale-95"></button>
          </form>
        </div>
        <div id="successState" class="hidden text-center py-16 success-pop">
          <div class="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-8"><i data-lucide="check-circle" class="text-emerald-400 w-10 h-10"></i></div>
          <h2 class="text-3xl font-black mb-4 text-emerald-500">TERKIRIM!</h2>
          <p class="opacity-80">Harap tunggu instruksi selanjutnya via WhatsApp.</p>
        </div>
      </main>
    </div>
  </div>

  <footer id="protectedFooter" class="mt-20 py-10 text-center opacity-40 text-[11px] font-bold">
    &copy; 2026 <a id="footerBrandLink" href="#">iMersWamel Pro</a>. All Rights Reserved.
  </footer>

  <script>
    // PENTING: Ganti URL di bawah dengan URL Web App Google lu yang baru kalo abis di-deploy ulang!
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyxLmq_IeePVWIQn-ULt8pGZBj9cBEVZE1PGBzYfrzkgavgl01-a0iUUD-wZmJoJqZ51g/exec"; 
    
    const getCampaignIdentity = () => {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('campaign') || window.location.pathname.split('/').filter(Boolean).pop() || "GENERAL";
    };

    const campaignId = getCampaignIdentity();
    let currentSettings = {};

    async function initializeApplication() {
      try {
        const response = await fetch(`${WEB_APP_URL}?action=getSettings&campaign=${campaignId}&_t=${Date.now()}`);
        const data = await response.json();
        currentSettings = data;

        document.body.className = `theme-${data.theme || 'midnight'}`;
        const styleTag = document.getElementById('dynamic-typography');
        
        let fontFamilyRaw = data.titleFontFamily || data.globalFontFamily || 'Poppins';
        let fontSizeRaw = data.titleFontSize || data.globalFontSize || '38';
        let colorTypeRaw = data.titleColorType || data.globalColorType || 'solid';
        
        let fontFamily = fontFamilyRaw === 'serif' ? 'Lora, serif' : (fontFamilyRaw === 'monospace' ? 'Courier Prime, monospace' : 'Poppins, sans-serif');
        let fontSize = parseInt(fontSizeRaw);

        let colorStyle = "";
        let btnStyle = "";
        
        if (colorTypeRaw === 'gradient') {
          let gradStart = data.titleGradientStart || data.globalGradientStart || '#6366f1';
          let gradEnd = data.titleGradientEnd || data.globalGradientEnd || '#a855f7';
          colorStyle = `background: linear-gradient(to right, ${gradStart}, ${gradEnd}) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important;`;
          btnStyle = `background: linear-gradient(135deg, ${gradStart} 0%, ${gradEnd} 100%) !important; shadow: 0 10px 25px -5px ${gradStart}66 !important;`;
        } else {
          let solidColor = data.titleColorSolid || data.globalColorSolid || '#ffffff';
          colorStyle = `color: ${solidColor} !important;`;
          btnStyle = `background-color: ${solidColor} !important; shadow: 0 10px 25px -5px ${solidColor}66 !important;`;
        }

        styleTag.innerHTML = `
          #dynamicAppName { font-size: ${fontSize}px !important; font-family: ${fontFamily} !important; ${colorStyle} text-align: center !important; }
          .btn-cta { ${btnStyle} }
          @media (max-width: 640px) { #dynamicAppName { font-size: ${Math.max(26, fontSize * 0.75)}px !important; } }
        `;

        if (data.layout === 'split') document.getElementById('mainWrapper').className = "layout-split animate-in";
        
        const imgUrl = data.productImageUrl || data.masterProductImageUrl;
        const showImg = String(data.showProductImg).toLowerCase() === "true" || String(data.masterShowProductImg).toLowerCase() === "true";

        if (showImg && imgUrl) {
          document.getElementById('productImage').src = imgUrl;
          document.getElementById('productImageWrapper').classList.remove('hidden');
        }

        document.title = data.appName || "iMersWamel";
        document.getElementById('dynamicAppName').innerText = data.appName || "iMersWamel";
        document.getElementById('dynamicTagline').innerText = data.tagline || "";
        document.getElementById('dynamicFormHeading').innerText = data.formHeading || "Daftar Sekarang";
        document.getElementById('submitBtn').innerText = data.btnText || "Dapatkan Akses";
        document.getElementById('campaignInput').value = campaignId;
        
        if (data.logoUrl) {
          document.getElementById('dynamicLogo').src = data.logoUrl;
          document.getElementById('logoWrapper').classList.remove('hidden');
        }

        document.getElementById('loader-overlay').style.opacity = '0';
        setTimeout(() => { document.getElementById('loader-overlay').remove(); document.body.style.opacity = '1'; lucide.createIcons(); }, 800);

      } catch (err) { console.error("Sync Fail:", err); }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = "⏳ SENDING..."; btn.disabled = true;
      const payload = Object.fromEntries(new FormData(event.target).entries());
      try {
        await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        document.getElementById('formWrapper').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
        lucide.createIcons();
        if (currentSettings.redirectUrl) setTimeout(() => { window.location.href = currentSettings.redirectUrl; }, 3000);
      } catch (e) { btn.disabled = false; btn.innerText = "RETRY"; }
    }

    document.addEventListener('DOMContentLoaded', initializeApplication);
  </script>
</body>
</html>
